# StoffelVM 5-node HoneyBadger MPC run for the AES-128 secret-bit circuit.
#
# Usage:
#   docker compose up --build
#
# Defaults run:
#   crates/stoffel-lang/examples/mpc_aes128_circuit/main.stfl
#
# The AES circuit is long-running. To change the packaged program/backend:
#   STOFFEL_PROGRAM=/app/programs/client_mul.stflb STOFFEL_MPC_BACKEND=honeybadger docker compose up --build

x-party-common: &party-common
  build:
    context: .
    dockerfile: Dockerfile
    additional_contexts:
      coordinator: "${STOFFEL_COORDINATOR_CONTEXT:-https://github.com/Stoffel-Labs/stoffel-mpc-coordinator.git#feature/no-feature-gates-and-multi-type-awareness}"
      network: "${STOFFEL_NETWORK_CONTEXT:-https://github.com/Stoffel-Labs/stoffel-networking.git#feature/robust-identity-based-on-cert}"
  networks:
    stoffel-net:
  volumes:
    - stoffel-local-store:/app/local-store
  environment: &party-env
    STOFFEL_AUTH_TOKEN: ${STOFFEL_AUTH_TOKEN:-stoffel-compose-honeybadger-token}
    STOFFEL_N_PARTIES: ${STOFFEL_N_PARTIES:-5}
    STOFFEL_THRESHOLD: ${STOFFEL_THRESHOLD:-1}
    STOFFEL_PROGRAM: ${STOFFEL_PROGRAM:-/app/programs/mpc_aes128_circuit.stflb}
    STOFFEL_ENTRY: ${STOFFEL_ENTRY:-main}
    STOFFEL_MPC_BACKEND: ${STOFFEL_MPC_BACKEND:-honeybadger}
    STOFFEL_MPC_CURVE: ${STOFFEL_MPC_CURVE:-bls12-381}
    RUST_MIN_STACK: ${RUST_MIN_STACK:-67108864}
    RUST_LOG: ${RUST_LOG:-info}
    RUST_BACKTRACE: "1"

services:
  party0:
    <<: *party-common
    container_name: stoffel-party0
    hostname: party0
    environment:
      <<: *party-env
      STOFFEL_ROLE: leader
      STOFFEL_PARTY_ID: "0"
      STOFFEL_BIND_ADDR: 172.28.0.10:9000
      STOFFEL_ADVERTISE_IP: 172.28.0.10
      STOFFEL_LOCAL_STORE: /app/local-store/party-0.redb
      STOFFEL_CERT: /app/ids/nodes/cert0.crt
      STOFFEL_KEY: /app/ids/nodes/key0.der
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.10
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "10000:10000/tcp"
      - "10000:10000/udp"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tuln | grep -q ':9000' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  party1:
    <<: *party-common
    container_name: stoffel-party1
    hostname: party1
    depends_on:
      party0:
        condition: service_healthy
    environment:
      <<: *party-env
      STOFFEL_ROLE: party
      STOFFEL_PARTY_ID: "1"
      STOFFEL_BIND_ADDR: 172.28.0.11:9001
      STOFFEL_BOOTSTRAP_ADDR: 172.28.0.10:9000
      STOFFEL_ADVERTISE_IP: 172.28.0.11
      STOFFEL_LOCAL_STORE: /app/local-store/party-1.redb
      STOFFEL_CERT: /app/ids/nodes/cert1.crt
      STOFFEL_KEY: /app/ids/nodes/key1.der
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.11
    ports:
      - "9001:9001/tcp"
      - "9001:9001/udp"

  party2:
    <<: *party-common
    container_name: stoffel-party2
    hostname: party2
    depends_on:
      party0:
        condition: service_healthy
    environment:
      <<: *party-env
      STOFFEL_ROLE: party
      STOFFEL_PARTY_ID: "2"
      STOFFEL_BIND_ADDR: 172.28.0.12:9002
      STOFFEL_BOOTSTRAP_ADDR: 172.28.0.10:9000
      STOFFEL_ADVERTISE_IP: 172.28.0.12
      STOFFEL_LOCAL_STORE: /app/local-store/party-2.redb
      STOFFEL_CERT: /app/ids/nodes/cert2.crt
      STOFFEL_KEY: /app/ids/nodes/key2.der
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.12
    ports:
      - "9002:9002/tcp"
      - "9002:9002/udp"

  party3:
    <<: *party-common
    container_name: stoffel-party3
    hostname: party3
    depends_on:
      party0:
        condition: service_healthy
    environment:
      <<: *party-env
      STOFFEL_ROLE: party
      STOFFEL_PARTY_ID: "3"
      STOFFEL_BIND_ADDR: 172.28.0.13:9003
      STOFFEL_BOOTSTRAP_ADDR: 172.28.0.10:9000
      STOFFEL_ADVERTISE_IP: 172.28.0.13
      STOFFEL_LOCAL_STORE: /app/local-store/party-3.redb
      STOFFEL_CERT: /app/ids/nodes/cert3.crt
      STOFFEL_KEY: /app/ids/nodes/key3.der
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.13
    ports:
      - "9003:9003/tcp"
      - "9003:9003/udp"

  party4:
    <<: *party-common
    container_name: stoffel-party4
    hostname: party4
    depends_on:
      party0:
        condition: service_healthy
    environment:
      <<: *party-env
      STOFFEL_ROLE: party
      STOFFEL_PARTY_ID: "4"
      STOFFEL_BIND_ADDR: 172.28.0.14:9004
      STOFFEL_BOOTSTRAP_ADDR: 172.28.0.10:9000
      STOFFEL_ADVERTISE_IP: 172.28.0.14
      STOFFEL_LOCAL_STORE: /app/local-store/party-4.redb
      STOFFEL_CERT: /app/ids/nodes/cert4.crt
      STOFFEL_KEY: /app/ids/nodes/key4.der
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.14
    ports:
      - "9004:9004/tcp"
      - "9004:9004/udp"

networks:
  stoffel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  stoffel-local-store:
