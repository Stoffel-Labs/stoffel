# StoffelVM 5-Node MPC Test Environment with Clients
# This docker-compose file sets up a 5-node MPC network with threshold 1
# and 2 clients that provide secret inputs to test distributed VM execution
# including program sync, leader node, and client input provision.
#
# Usage:
#   STOFFEL_AUTH_TOKEN=<token> docker-compose up
#
# To view logs from a specific party:
#   docker-compose logs -f party0

services:
  # Party 0 - Leader node (runs bootnode + party 0)
  party0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-party0
    hostname: party0
    environment:
      - STOFFEL_ROLE=leader
      - STOFFEL_AUTH_TOKEN=${STOFFEL_AUTH_TOKEN:-}
      - STOFFEL_PARTY_ID=0
      - STOFFEL_BIND_ADDR=172.28.0.10:9000
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_PROGRAM=/app/programs/client_mul.stflb
      - STOFFEL_ENTRY=main
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_RPC_ADDR=172.28.0.10:16180
      - STOFFEL_CERT=/app/ids/nodes/cert0.crt
      - STOFFEL_KEY=/app/ids/nodes/key0.der
      - STOFFEL_EXPECTED_CLIENTS=/app/ids/clients/cert0.crt,/app/ids/clients/cert1.crt
      - STOFFEL_TIMESTAMP=0
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.10
    ports:
      - "9000:9000/tcp"
      - "9000:9000/udp"
      - "10000:10000/tcp"
      - "10000:10000/udp"
      - "16180:16180/tcp"
      - "16180:16180/udp"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tuln | grep -q ':9000' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Party 1
  party1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-party1
    hostname: party1
    environment:
      - STOFFEL_ROLE=party
      - STOFFEL_AUTH_TOKEN=${STOFFEL_AUTH_TOKEN:-}
      - STOFFEL_PARTY_ID=1
      - STOFFEL_BIND_ADDR=172.28.0.11:9001
      - STOFFEL_BOOTSTRAP_ADDR=172.28.0.10:9000
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_PROGRAM=/app/programs/client_mul.stflb
      - STOFFEL_ENTRY=main
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_RPC_ADDR=172.28.0.11:16181
      - STOFFEL_CERT=/app/ids/nodes/cert1.crt
      - STOFFEL_KEY=/app/ids/nodes/key1.der
      - STOFFEL_EXPECTED_CLIENTS=/app/ids/clients/cert0.crt,/app/ids/clients/cert1.crt
      - STOFFEL_TIMESTAMP=0
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.11
    depends_on:
      party0:
        condition: service_healthy
    ports:
      - "9001:9001/tcp"
      - "9001:9001/udp"
      - "16181:16181/tcp"
      - "16181:16181/udp"

  # Party 2
  party2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-party2
    hostname: party2
    environment:
      - STOFFEL_ROLE=party
      - STOFFEL_AUTH_TOKEN=${STOFFEL_AUTH_TOKEN:-}
      - STOFFEL_PARTY_ID=2
      - STOFFEL_BIND_ADDR=172.28.0.12:9002
      - STOFFEL_BOOTSTRAP_ADDR=172.28.0.10:9000
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_PROGRAM=/app/programs/client_mul.stflb
      - STOFFEL_ENTRY=main
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_RPC_ADDR=172.28.0.12:16182
      - STOFFEL_CERT=/app/ids/nodes/cert2.crt
      - STOFFEL_KEY=/app/ids/nodes/key2.der
      - STOFFEL_EXPECTED_CLIENTS=/app/ids/clients/cert0.crt,/app/ids/clients/cert1.crt
      - STOFFEL_TIMESTAMP=0
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.12
    depends_on:
      party0:
        condition: service_healthy
    ports:
      - "9002:9002/tcp"
      - "9002:9002/udp"
      - "16182:16182/tcp"
      - "16182:16182/udp"

  # Party 3
  party3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-party3
    hostname: party3
    environment:
      - STOFFEL_ROLE=party
      - STOFFEL_AUTH_TOKEN=${STOFFEL_AUTH_TOKEN:-}
      - STOFFEL_PARTY_ID=3
      - STOFFEL_BIND_ADDR=172.28.0.13:9003
      - STOFFEL_BOOTSTRAP_ADDR=172.28.0.10:9000
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_PROGRAM=/app/programs/client_mul.stflb
      - STOFFEL_ENTRY=main
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_RPC_ADDR=172.28.0.13:16183
      - STOFFEL_CERT=/app/ids/nodes/cert3.crt
      - STOFFEL_KEY=/app/ids/nodes/key3.der
      - STOFFEL_EXPECTED_CLIENTS=/app/ids/clients/cert0.crt,/app/ids/clients/cert1.crt
      - STOFFEL_TIMESTAMP=0
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.13
    depends_on:
      party0:
        condition: service_healthy
    ports:
      - "9003:9003/tcp"
      - "9003:9003/udp"
      - "16183:16183/tcp"
      - "16183:16183/udp"

  # Party 4
  party4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-party4
    hostname: party4
    environment:
      - STOFFEL_ROLE=party
      - STOFFEL_AUTH_TOKEN=${STOFFEL_AUTH_TOKEN:-}
      - STOFFEL_PARTY_ID=4
      - STOFFEL_BIND_ADDR=172.28.0.14:9004
      - STOFFEL_BOOTSTRAP_ADDR=172.28.0.10:9000
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_PROGRAM=/app/programs/client_mul.stflb
      - STOFFEL_ENTRY=main
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_RPC_ADDR=172.28.0.14:16184
      - STOFFEL_CERT=/app/ids/nodes/cert4.crt
      - STOFFEL_KEY=/app/ids/nodes/key4.der
      - STOFFEL_EXPECTED_CLIENTS=/app/ids/clients/cert0.crt,/app/ids/clients/cert1.crt
      - STOFFEL_TIMESTAMP=0
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.14
    depends_on:
      party0:
        condition: service_healthy
    ports:
      - "9004:9004/tcp"
      - "9004:9004/udp"
      - "16184:16184/tcp"
      - "16184:16184/udp"

  # Client 0 - Provides first input (value: 15)
  client0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-client0
    hostname: client0
    environment:
      - STOFFEL_ROLE=client
      - STOFFEL_INPUTS=15
      - STOFFEL_CLIENT_INDEX=0
      - STOFFEL_SERVERS=172.28.0.10:16180,172.28.0.11:16181,172.28.0.12:16182,172.28.0.13:16183,172.28.0.14:16184
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_CERT=/app/ids/clients/cert0.crt
      - STOFFEL_KEY=/app/ids/clients/key0.der
      - STOFFEL_TIMESTAMP=0
      - STOFFEL_CLIENT_DELAY=15
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.100
    depends_on:
      party0:
        condition: service_healthy
      party1:
        condition: service_started
      party2:
        condition: service_started
      party3:
        condition: service_started
      party4:
        condition: service_started

  # Client 1 - Provides second input (value: 25)
  client1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stoffel-client1
    hostname: client1
    environment:
      - STOFFEL_ROLE=client
      - STOFFEL_INPUTS=25
      - STOFFEL_CLIENT_INDEX=1
      - STOFFEL_SERVERS=172.28.0.10:16180,172.28.0.11:16181,172.28.0.12:16182,172.28.0.13:16183,172.28.0.14:16184
      - STOFFEL_N_PARTIES=5
      - STOFFEL_THRESHOLD=1
      - STOFFEL_COORD_ADDR=host.docker.internal:31415
      - STOFFEL_CERT=/app/ids/clients/cert1.crt
      - STOFFEL_KEY=/app/ids/clients/key1.der
      - STOFFEL_TIMESTAMP=0
      - STOFFEL_CLIENT_DELAY=15
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      stoffel-net:
        ipv4_address: 172.28.0.101
    depends_on:
      party0:
        condition: service_healthy
      party1:
        condition: service_started
      party2:
        condition: service_started
      party3:
        condition: service_started
      party4:
        condition: service_started

networks:
  stoffel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
