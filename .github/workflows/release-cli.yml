name: Release CLI

on:
  push:
    tags:
      - "cli-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "CLI release tag, e.g. cli-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---- Resolve + validate the tag once, before building anything. ----
  meta:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
      version: ${{ steps.ref.outputs.version }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi
          version="${tag#cli-v}"
          if [ "$version" = "$tag" ]; then
            echo "Tag '$tag' is not of the form 'cli-v<version>'"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches stoffel-cli version
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(next(p['version'] for p in m['packages'] if p['name']=='stoffel-cli'))")"
          if [ "$crate_version" != "${{ steps.ref.outputs.version }}" ]; then
            echo "Tag ${{ steps.ref.outputs.tag }} does not match stoffel-cli version $crate_version"; exit 1
          fi

      - name: Check tag commit is contained in main
        run: |
          git fetch origin main
          git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'

  # ---- Build each target natively (no cross-compilation). ----
  build:
    name: Build ${{ matrix.target }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin,        runner: macos-14 }
          - { target: aarch64-apple-darwin,       runner: macos-14 }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build stoffel CLI
        run: cargo build --release -p stoffel-cli --bin stoffel --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          version="${{ needs.meta.outputs.version }}"
          stage="stoffel-$version-$target"

          mkdir -p "dist/$stage"
          cp "target/$target/release/stoffel" "dist/$stage/"

          # COPYFILE_DISABLE avoids AppleDouble (._*) entries from macOS tar.
          COPYFILE_DISABLE=1 tar -C dist -czf "dist/$stage.tar.gz" "$stage"
          rm -rf "dist/$stage"

          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$stage.tar.gz" > "$stage.tar.gz.sha256"
          else
            shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256"
          fi
          cat "$stage.tar.gz.sha256"

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ---- Collect all targets, build one SHA256SUMS, publish the release. ----
  release:
    name: Publish GitHub Release
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.tar.gz.sha256 > SHA256SUMS
          rm -f *.tar.gz.sha256
          echo "----- SHA256SUMS -----"
          cat SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          notes_file="$(mktemp)"
          {
            echo "Stoffel CLI $TAG (version $VERSION)."
            echo
            echo "Install:  curl -fsSL https://get.stoffelmpc.com | sh"
            echo
            echo "Prebuilt targets: linux x86_64/aarch64, macOS x86_64/aarch64."
            echo "commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            echo "Checksums are attached as the SHA256SUMS asset."
          } > "$notes_file"

          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "$TAG" --notes-file "$notes_file"
          else
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
              --title "$TAG" --notes-file "$notes_file"
          fi

          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" \
            dist/*.tar.gz dist/SHA256SUMS --clobber
